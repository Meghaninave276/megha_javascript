<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364, #1c92d2);
  min-height: 100vh;
  padding: 20px;
}

/* Top Input */
.container {
  max-width: 900px;
  margin: auto;
}

#input {
  border-radius: 50px;
  padding: 14px 20px;
  border: none;
  outline: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#add {
  border-radius: 50px;
  padding: 12px 30px;
  font-weight: bold;
  border: none;
  background: linear-gradient(135deg, #00c9ff, #92fe9d);
}

/* Layout */
.main {
  display: flex;
  gap: 25px;
  margin-top: 30px;
}

/* Main Cards */
.box {
  width: 70%;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;

  padding: 20px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(12px);
}

/* Default card */
.box3 {
  width: 280px;
  border-radius: 20px;
  background: #fff;
  padding: 15px;

  display: flex;
  flex-direction: column;
  justify-content: space-between; /* 🔥 IMPORTANT */

  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.box3 img {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  object-fit: cover;
}

.box3 h1 {
  font-size: 20px;
  text-align: center;
  margin-top: 10px;
}

.box3 h2 {
  text-align: center;
  font-size: 14px;
  color: #555;
}

/* ========================= */
/* ✅ FAVOURITES FIX START */
/* ========================= */

.box2 {
  width: 30%;
  border-radius: 20px;
  padding: 20px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);

  display: flex;
  flex-direction: column;
  align-items: center;

  max-height: 80vh;
  overflow-y: auto;
}

.box2 h2 {
  color: white;
  margin-bottom: 15px;
}

/* 🔥 KEY FIX */
.box2 .box3 {
  width: 90%;
  margin: 15px 0;

  height: auto;              /* allow full height */
  min-height: 280px;         /* give space */

  display: flex;
  flex-direction: column;
  justify-content: space-between; /* button goes bottom */

  align-items: center;
  padding: 15px;
}

/* Smaller image */
.box2 .box3 img {
  width: 80%;
  height: 120px;
}

/* Text center */
.box2 .box3 h1,
.box2 .box3 h2 {
  text-align: center;
}

/* 🔥 BUTTON ALWAYS VISIBLE */
.box2 .box3 button {
  width: 100%;
  margin-top: 10px;
}

/* ========================= */
/* ✅ END */
/* ========================= */
</style>

</head>
<body>
    <div class="container d-flex gap-4 mt-3">
          <input type="text" id="input" class="form-control w-75" placeholder="Enter country name" aria-label="Username" aria-describedby="basic-addon1">
          <button type="button" class="btn btn-success px-5" id="add">add</button>

    </div>

    <div class="main mt-3">
         

        <div class="box" id="box">
            <!-- <div class="box1">

            </div>
 -->

       


         </div>

         <div class="box2 " id="box2">
            <h2>Favourites</h2>



         </div>
    </div>

   
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="script.js"></script>
</html>
